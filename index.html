<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ConstructIQ · Project Expense Tracker + Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eef2f9 0%, #e2e8f0 100%);
      color: #1e293b;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 24px 40px;
    }

    /* header */
    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      padding: 16px 24px;
      border-radius: 32px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .logo-area h1 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1e293b, #2563eb, #10b981);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo-area p {
      font-size: 0.8rem;
      color: #64748b;
    }

    .action-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 60px;
      padding: 8px 18px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f1f5f9;
      color: #1e293b;
    }
    .btn-primary {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(0,0,0,0.15); }
    .btn-outline {
      background: white;
      border: 1px solid #cbd5e1;
    }
    .btn-outline:hover { background: #f8fafc; border-color: #94a3b8; transform: translateY(-1px); }
    .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
      margin-top: 10px;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 12px 28px -8px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      border: 1px solid rgba(0,0,0,0.05);
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15); }

    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .project-name {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(145deg, #0f2b3d, #1e3a8a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .location-badge {
      background: #eef2ff;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #2563eb;
    }
    .total-expense {
      font-size: 2rem;
      font-weight: 800;
      margin: 12px 0 8px;
      color: #0f172a;
    }
    .category-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    .cat-pill {
      flex: 1;
      min-width: 70px;
      border-radius: 40px;
      padding: 8px 6px;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      transition: transform 0.2s;
    }
    .cat-pill:hover { transform: scale(1.02); }
    .pill-material { background: linear-gradient(135deg, #3b82f6, #2563eb); }
    .pill-labor { background: linear-gradient(135deg, #f97316, #ea580c); }
    .pill-travel { background: linear-gradient(135deg, #10b981, #059669); }
    .pill-equipment { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }

    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .card-actions .btn {
      flex: 1;
      justify-content: center;
      font-size: 0.75rem;
      padding: 8px 12px;
    }

    /* dashboard stats - enhanced */
    .dashboard-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: white;
      border-radius: 28px;
      padding: 24px 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
      transition: all 0.3s;
      border: 1px solid rgba(0,0,0,0.03);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #3b82f6, #10b981, #f97316);
    }
    .stat-card:hover { transform: translateY(-4px); box-shadow: 0 16px 28px rgba(0,0,0,0.1); }
    .stat-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
      color: #64748b;
    }
    .stat-number {
      font-size: 2.5rem;
      font-weight: 800;
      margin-top: 8px;
      background: linear-gradient(135deg, #1e293b, #2563eb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* enhanced category cards */
    .insight-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-top: 20px;
    }
    .insight-item {
      background: linear-gradient(135deg, #ffffff, #f8fafc);
      border-radius: 24px;
      padding: 20px 16px;
      text-align: center;
      border: 1px solid rgba(59,130,246,0.1);
      transition: all 0.3s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .insight-item::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .insight-item:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
    .insight-item:hover::after { opacity: 1; }
    .insight-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .insight-value {
      font-size: 1.6rem;
      font-weight: 800;
      margin-top: 4px;
    }
    .insight-percent {
      font-size: 0.7rem;
      color: #94a3b8;
      margin-top: 6px;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 28px;
      margin-top: 28px;
    }
    .chart-card {
      background: white;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      transition: all 0.3s;
      border: 1px solid rgba(0,0,0,0.03);
    }
    .chart-card:hover { transform: translateY(-3px); box-shadow: 0 16px 32px rgba(0,0,0,0.08); }
    .chart-card h3 {
      margin-bottom: 20px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* modal styles */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .modal-content {
      background: white;
      max-width: 550px;
      width: 100%;
      border-radius: 36px;
      padding: 32px 28px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.25);
      animation: fadeSlideUp 0.25s ease;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px);}
      to { opacity: 1; transform: translateY(0);}
    }
    input, textarea, select {
      width: 100%;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1.5px solid #e2e8f0;
      margin-bottom: 16px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    .prediction-badge {
      background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      border-radius: 60px;
      padding: 8px 14px;
      display: inline-block;
      margin-bottom: 18px;
      font-size: 0.85rem;
    }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 8px; border-bottom: 1px solid #eef2f6; text-align: left; font-size: 0.85rem; }
    th { font-weight: 700; color: #475569; }
    .hidden { display: none; }
    .empty-state { background: white; border-radius: 2rem; padding: 60px 20px; text-align: center; color: #64748b; }
    .back-button { margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; background: white; border-radius: 40px; padding: 10px 20px; cursor: pointer; border: 1px solid #e2e8f0; font-weight: 600; transition: all 0.2s; }
    .back-button:hover { background: #f8fafc; transform: translateX(-4px); }
    .project-detail-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    @media (max-width: 768px) {
      .insight-grid { grid-template-columns: repeat(2, 1fr); }
      .app-container { padding: 14px; }
      .project-name { font-size: 1.2rem; }
      .stat-number { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <div class="logo-area">
      <h1><i class="fas fa-hard-hat"></i> ConstructIQ</h1>
      <p>Smart tracking · Real insights · Complete control</p>
    </div>
    <div class="action-group">
      <button id="homeNavBtn" class="btn btn-outline"><i class="fas fa-building"></i> All Projects</button>
      <button id="globalDashboardBtn" class="btn btn-outline"><i class="fas fa-chart-pie"></i> Global Dashboard</button>
      <button id="exportJsonBtn" class="btn btn-outline"><i class="fas fa-download"></i> JSON</button>
      <button id="exportCsvBtn" class="btn btn-outline"><i class="fas fa-file-csv"></i> CSV</button>
      <button id="openProjectModalBtn" class="btn btn-primary"><i class="fas fa-plus-circle"></i> New Project</button>
    </div>
  </div>

  <!-- MAIN PROJECTS LIST SECTION -->
  <section id="homeSection">
    <div id="projectsGrid" class="projects-grid"></div>
  </section>

  <!-- GLOBAL DASHBOARD SECTION (aggregated) with premium UI -->
  <section id="globalDashboardSection" class="hidden">
    <div class="dashboard-stats" id="dashboardStatsArea"></div>
    <div class="chart-card" style="margin-bottom: 20px; background: linear-gradient(135deg, #ffffff, #fefefe);">
      <h3><i class="fas fa-chart-pie" style="color: #3b82f6;"></i> Expense Breakdown by Category</h3>
      <div id="enhancedCategoryInsights" class="insight-grid"></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card">
        <h3><i class="fas fa-chart-simple" style="color: #f97316;"></i> Distribution Overview</h3>
        <canvas id="pieChartCanvas" style="max-height: 280px; width:100%"></canvas>
      </div>
      <div class="chart-card">
        <h3><i class="fas fa-chart-column" style="color: #10b981;"></i> Project Cost Comparison</h3>
        <canvas id="barChartCanvas" style="max-height: 280px; width:100%"></canvas>
      </div>
    </div>
  </section>

  <!-- PERSONAL PROJECT DASHBOARD -->
  <section id="projectDashboardSection" class="hidden">
    <div class="back-button" id="backToProjectsBtn"><i class="fas fa-arrow-left"></i> Back to All Projects</div>
    <div id="personalDashboardContainer"></div>
  </section>
</div>

<!-- MODALS -->
<div id="projectModal" class="modal hidden">
  <div class="modal-content">
    <h3><i class="fas fa-draw-polygon"></i> Start New Project</h3>
    <form id="projectForm">
      <label>🏗️ Project Name</label>
      <input id="projectNameInput" placeholder="e.g., Riverside Bridge" required>
      <label>📍 Site Location</label>
      <input id="projectLocationInput" placeholder="City / Site address" required>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">Create Project</button>
        <button type="button" id="closeProjectModalBtn" class="btn btn-outline">Cancel</button>
      </div>
    </form>
  </div>
</div>

<div id="expenseModal" class="modal hidden">
  <div class="modal-content">
    <h3><i class="fas fa-receipt"></i> Add Expense</h3>
    <form id="expenseForm">
      <input type="hidden" id="expenseProjectId">
      <label>📝 Description</label>
      <textarea id="expenseDescriptionInput" rows="2" placeholder="e.g., Cement, labor wages, fuel" required></textarea>
      <label>💰 Amount (INR)</label>
      <input id="expenseAmountInput" type="number" min="1" step="0.01" placeholder="0.00" required>
      <div class="prediction-badge"><i class="fas fa-microchip"></i> AI Smart Category: <strong id="predictedCategoryText">—</strong></div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">Save Expense</button>
        <button type="button" id="closeExpenseModalBtn" class="btn btn-outline">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script>
  // PERSISTENT STORAGE
  let projectsStore = [];
  let expensesStore = [];

  function loadFromLocalStorage() {
    const savedProjects = localStorage.getItem("constru_projects");
    const savedExpenses = localStorage.getItem("constru_expenses");
    if (savedProjects) projectsStore = JSON.parse(savedProjects);
    if (savedExpenses) expensesStore = JSON.parse(savedExpenses);
    if (projectsStore.length === 0 && (!savedProjects || projectsStore.length === 0)) {
      projectsStore = [
        { id: 1001, name: "Greenfield Tower", location: "Mumbai, MH" },
        { id: 1002, name: "Highway Expansion", location: "Pune, MH" }
      ];
      expensesStore = [
        { id: 5001, projectId: 1001, description: "Cement 200 bags", amount: 48000, category: "Material", date: new Date().toISOString().slice(0,10) },
        { id: 5002, projectId: 1001, description: "Electrician labor 5 days", amount: 12500, category: "Labor", date: new Date().toISOString().slice(0,10) },
        { id: 5003, projectId: 1002, description: "Excavator rental", amount: 32000, category: "Equipment", date: new Date().toISOString().slice(0,10) },
        { id: 5004, projectId: 1002, description: "Transport diesel", amount: 8600, category: "Travel", date: new Date().toISOString().slice(0,10) }
      ];
    }
    syncToLocalStorage();
  }

  function syncToLocalStorage() {
    localStorage.setItem("constru_projects", JSON.stringify(projectsStore));
    localStorage.setItem("constru_expenses", JSON.stringify(expensesStore));
  }

  function predictCategoryFromText(description) {
    const text = description.toLowerCase();
    if (/(cement|concrete|brick|steel|wood|paint|pipe|sand|aggregate|material|plywood|tile|glass|bricks|rebar)/.test(text)) return "Material";
    if (/(worker|labour|labor|wage|electrician|plumber|mason|helper|shift|overtime|foreman|site engineer)/.test(text)) return "Labor";
    if (/(travel|transport|fuel|petrol|diesel|taxi|bus|train|flight|mileage|conveyance|logistics)/.test(text)) return "Travel";
    if (/(excavator|crane|loader|jcb|equipment|rental|compressor|generator|drill|machine|dozer)/.test(text)) return "Equipment";
    return "Material";
  }

  function getProjectSummaries() {
    return projectsStore.map(proj => {
      const projExpenses = expensesStore.filter(e => e.projectId === proj.id);
      const total = projExpenses.reduce((sum, e) => sum + e.amount, 0);
      const catSummary = { Material: 0, Labor: 0, Travel: 0, Equipment: 0 };
      projExpenses.forEach(e => { catSummary[e.category] = (catSummary[e.category] || 0) + e.amount; });
      return { id: proj.id, project_name: proj.name, location: proj.location, total_expense: total, category_summary: catSummary };
    });
  }

  function getDashboardAggregates() {
    let categoryTotals = { Material: 0, Labor: 0, Travel: 0, Equipment: 0 };
    let projectTotalsMap = new Map();
    expensesStore.forEach(exp => {
      categoryTotals[exp.category] = (categoryTotals[exp.category] || 0) + exp.amount;
      const proj = projectsStore.find(p => p.id === exp.projectId);
      if (proj) {
        const curr = projectTotalsMap.get(exp.projectId) || { project_name: proj.name, total: 0 };
        curr.total += exp.amount;
        projectTotalsMap.set(exp.projectId, curr);
      }
    });
    const project_totals = Array.from(projectTotalsMap.values());
    const total_expense = Object.values(categoryTotals).reduce((a,b)=>a+b,0);
    return { category_totals: categoryTotals, project_totals, total_expense };
  }

  function renderProjects() {
    const grid = document.getElementById("projectsGrid");
    const projects = getProjectSummaries();
    if (!projects.length) {
      grid.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open" style="font-size: 3rem; opacity:0.6;"></i><p style="margin-top:16px;">No construction projects yet.<br>Click <strong>+ New Project</strong> to start tracking.</p></div>`;
      return;
    }
    grid.innerHTML = projects.map(p => `
      <div class="card">
        <div class="project-header">
          <span class="project-name">${escapeHtml(p.project_name)}</span>
          <span class="location-badge"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(p.location)}</span>
        </div>
        <div class="total-expense">₹ ${p.total_expense.toLocaleString('en-IN', {minimumFractionDigits:2})}</div>
        <div class="category-strip">
          <div class="cat-pill pill-material"><i class="fas fa-cubes"></i> Material<br>₹ ${p.category_summary.Material.toLocaleString()}</div>
          <div class="cat-pill pill-labor"><i class="fas fa-users"></i> Labor<br>₹ ${p.category_summary.Labor.toLocaleString()}</div>
          <div class="cat-pill pill-travel"><i class="fas fa-truck"></i> Travel<br>₹ ${p.category_summary.Travel.toLocaleString()}</div>
          <div class="cat-pill pill-equipment"><i class="fas fa-digging"></i> Equipment<br>₹ ${p.category_summary.Equipment.toLocaleString()}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-primary add-expense-trigger" data-id="${p.id}"><i class="fas fa-plus-circle"></i> Add Expense</button>
          <button class="btn btn-success view-project-dashboard" data-id="${p.id}" data-name="${escapeHtml(p.project_name)}"><i class="fas fa-chart-line"></i> View Dashboard</button>
        </div>
      </div>
    `).join("");
    
    document.querySelectorAll(".add-expense-trigger").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        document.getElementById("expenseProjectId").value = btn.dataset.id;
        document.getElementById("predictedCategoryText").innerText = "—";
        document.getElementById("expenseDescriptionInput").value = "";
        document.getElementById("expenseAmountInput").value = "";
        openModal("expenseModal");
      });
    });
    document.querySelectorAll(".view-project-dashboard").forEach(btn => {
      btn.addEventListener("click", () => {
        const projectId = parseInt(btn.dataset.id);
        const projectName = btn.dataset.name;
        showPersonalProjectDashboard(projectId, projectName);
      });
    });
  }

  let personalPieChart = null, personalBarChart = null;
  async function showPersonalProjectDashboard(projectId, projectName) {
    const proj = projectsStore.find(p => p.id === projectId);
    if (!proj) return;
    const expenses = expensesStore.filter(e => e.projectId === projectId).sort((a,b) => new Date(b.date) - new Date(a.date));
    const totalSpent = expenses.reduce((s,e) => s + e.amount, 0);
    const catBreak = { Material: 0, Labor: 0, Travel: 0, Equipment: 0 };
    expenses.forEach(e => { catBreak[e.category] = (catBreak[e.category] || 0) + e.amount; });
    
    const container = document.getElementById("personalDashboardContainer");
    container.innerHTML = `
      <div class="project-detail-header">
        <div><h2 style="font-size: 2rem;"><i class="fas fa-hard-hat"></i> ${escapeHtml(proj.name)}</h2>
        <p><i class="fas fa-location-dot"></i> ${escapeHtml(proj.location)} | Total Spent: ₹ ${totalSpent.toLocaleString()}</p></div>
        <button id="quickAddExpenseFromDashboard" class="btn btn-primary" data-id="${projectId}"><i class="fas fa-plus"></i> Add Expense</button>
      </div>
      <div class="dashboard-stats">
        <div class="stat-card"><div class="stat-title">Total Expenses</div><div class="stat-number">₹ ${totalSpent.toLocaleString()}</div></div>
        <div class="stat-card"><div class="stat-title">Top Category</div><div class="stat-number">${Object.entries(catBreak).sort((a,b)=>b[1]-a[1])[0]?.[0] || '—'}</div></div>
        <div class="stat-card"><div class="stat-title">Transactions</div><div class="stat-number">${expenses.length}</div></div>
      </div>
      <div class="chart-grid">
        <div class="chart-card"><h3>Category Split</h3><canvas id="personalPieCanvas" style="max-height: 260px;"></canvas></div>
        <div class="chart-card"><h3>Category Amounts</h3><canvas id="personalBarCanvas" style="max-height: 260px;"></canvas></div>
      </div>
      <div class="chart-card" style="margin-top: 20px;">
        <h3><i class="fas fa-list"></i> Expense Transactions</h3>
        <div style="overflow-x: auto;"><table style="width:100%"><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th></tr></thead><tbody id="personalExpenseTableBody"></tbody></table></div>
      </div>
    `;
    const tbody = document.getElementById("personalExpenseTableBody");
    if (expenses.length === 0) tbody.innerHTML = `<tr><td colspan="4">No expenses recorded. Click 'Add Expense' to start. </td></tr>`;
    else {
      tbody.innerHTML = expenses.map(exp => `<tr><td>${exp.date}</td><td>${escapeHtml(exp.description)}</td><td><span style="background:#eef2ff; padding:4px 12px; border-radius:40px;">${exp.category}</span></td><td>₹ ${exp.amount.toLocaleString()}</td>`).join("");
    }
    if (personalPieChart) personalPieChart.destroy();
    const pieCtx = document.getElementById("personalPieCanvas").getContext("2d");
    personalPieChart = new Chart(pieCtx, { type: 'pie', data: { labels: ['Material','Labor','Travel','Equipment'], datasets: [{ data: [catBreak.Material, catBreak.Labor, catBreak.Travel, catBreak.Equipment], backgroundColor: ['#3b82f6','#f97316','#10b981','#8b5cf6'] }] }, options: { responsive: true } });
    if (personalBarChart) personalBarChart.destroy();
    const barCtx = document.getElementById("personalBarCanvas").getContext("2d");
    personalBarChart = new Chart(barCtx, { type: 'bar', data: { labels: ['Material','Labor','Travel','Equipment'], datasets: [{ label: 'Amount (₹)', data: [catBreak.Material, catBreak.Labor, catBreak.Travel, catBreak.Equipment], backgroundColor: '#1e293b', borderRadius: 10 }] }, options: { responsive: true, scales: { y: { beginAtZero: true } } } });
    document.getElementById("quickAddExpenseFromDashboard")?.addEventListener("click", (e) => {
      document.getElementById("expenseProjectId").value = e.currentTarget.dataset.id;
      document.getElementById("predictedCategoryText").innerText = "—";
      openModal("expenseModal");
    });
    document.getElementById("homeSection").classList.add("hidden");
    document.getElementById("globalDashboardSection").classList.add("hidden");
    document.getElementById("projectDashboardSection").classList.remove("hidden");
  }

  let pieChart, barChart;
  async function loadGlobalDashboard() {
    const data = getDashboardAggregates();
    document.getElementById("dashboardStatsArea").innerHTML = `
      <div class="stat-card"><div class="stat-title">Total Portfolio</div><div class="stat-number">₹ ${data.total_expense.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-title">Active Projects</div><div class="stat-number">${projectsStore.length}</div></div>
      <div class="stat-card"><div class="stat-title">Total Transactions</div><div class="stat-number">${expensesStore.length}</div></div>
    `;
    const insightDiv = document.getElementById("enhancedCategoryInsights");
    const cats = ['Material', 'Labor', 'Travel', 'Equipment'];
    const icons = { Material: 'fa-cubes', Labor: 'fa-users', Travel: 'fa-truck', Equipment: 'fa-digging' };
    const colors = { Material: '#3b82f6', Labor: '#f97316', Travel: '#10b981', Equipment: '#8b5cf6' };
    insightDiv.innerHTML = cats.map(cat => `<div class="insight-item" style="border-top: 4px solid ${colors[cat]};"><div class="insight-label"><i class="fas ${icons[cat]}"></i> ${cat}</div><div class="insight-value">₹ ${data.category_totals[cat].toLocaleString()}</div><div class="insight-percent">${((data.category_totals[cat]/data.total_expense)*100 || 0).toFixed(1)}% of total</div></div>`).join("");
    if (pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById("pieChartCanvas"), { type: 'pie', data: { labels: cats, datasets: [{ data: cats.map(c => data.category_totals[c]), backgroundColor: ['#3b82f6','#f97316','#10b981','#8b5cf6'], borderWidth: 0 }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
    if (barChart) barChart.destroy();
    barChart = new Chart(document.getElementById("barChartCanvas"), { type: 'bar', data: { labels: data.project_totals.map(p => p.project_name), datasets: [{ label: 'Expense (₹)', data: data.project_totals.map(p => p.total), backgroundColor: '#1e293b', borderRadius: 12 }] }, options: { responsive: true, scales: { y: { beginAtZero: true } } } });
  }

  async function refreshAll() { renderProjects(); if (!document.getElementById("globalDashboardSection").classList.contains("hidden")) await loadGlobalDashboard(); syncToLocalStorage(); }
  function exportJson() { const blob = new Blob([JSON.stringify({ projects: projectsStore, expenses: expensesStore }, null,2)], {type: "application/json"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "constru_data.json"; a.click(); URL.revokeObjectURL(blob); }
  function exportCsv() { let rows = [["ProjectID","ProjectName","Location","Description","Category","Amount","Date"]]; expensesStore.forEach(exp => { const p = projectsStore.find(pr => pr.id === exp.projectId); rows.push([exp.projectId, p?.name || "", p?.location || "", exp.description, exp.category, exp.amount, exp.date]); }); const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\n"); const blob = new Blob([csv], {type: "text/csv"}); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "expenses.csv"; a.click(); URL.revokeObjectURL(blob); }
  function openModal(id) { document.getElementById(id).classList.remove("hidden"); }
  function closeModal(id) { document.getElementById(id).classList.add("hidden"); }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

  document.getElementById("expenseDescriptionInput")?.addEventListener("input", function() { const cat = predictCategoryFromText(this.value.trim()); document.getElementById("predictedCategoryText").innerHTML = cat ? `${cat} <i class="fas fa-magic"></i>` : "—"; });
  document.getElementById("openProjectModalBtn").onclick = () => openModal("projectModal");
  document.getElementById("closeProjectModalBtn").onclick = () => closeModal("projectModal");
  document.getElementById("closeExpenseModalBtn").onclick = () => closeModal("expenseModal");
  document.getElementById("homeNavBtn").onclick = () => { document.getElementById("homeSection").classList.remove("hidden"); document.getElementById("globalDashboardSection").classList.add("hidden"); document.getElementById("projectDashboardSection").classList.add("hidden"); renderProjects(); };
  document.getElementById("globalDashboardBtn").onclick = async () => { document.getElementById("homeSection").classList.add("hidden"); document.getElementById("projectDashboardSection").classList.add("hidden"); document.getElementById("globalDashboardSection").classList.remove("hidden"); await loadGlobalDashboard(); };
  document.getElementById("backToProjectsBtn").onclick = () => { document.getElementById("homeSection").classList.remove("hidden"); document.getElementById("projectDashboardSection").classList.add("hidden"); document.getElementById("globalDashboardSection").classList.add("hidden"); renderProjects(); };
  document.getElementById("exportJsonBtn").onclick = exportJson;
  document.getElementById("exportCsvBtn").onclick = exportCsv;
  document.getElementById("projectForm").onsubmit = (e) => { e.preventDefault(); const name = document.getElementById("projectNameInput").value.trim(); const loc = document.getElementById("projectLocationInput").value.trim(); if(!name || !loc) return alert("Fill all fields"); projectsStore.push({ id: Date.now(), name, location: loc }); syncToLocalStorage(); closeModal("projectModal"); e.target.reset(); refreshAll(); };
  document.getElementById("expenseForm").onsubmit = (e) => { e.preventDefault(); const projectId = parseInt(document.getElementById("expenseProjectId").value); const desc = document.getElementById("expenseDescriptionInput").value.trim(); const amount = parseFloat(document.getElementById("expenseAmountInput").value); if(!projectId || !desc || isNaN(amount) || amount<=0) return alert("Valid expense required"); const category = predictCategoryFromText(desc); expensesStore.push({ id: Date.now(), projectId, description: desc, amount, category, date: new Date().toISOString().slice(0,10) }); syncToLocalStorage(); closeModal("expenseModal"); document.getElementById("expenseForm").reset(); refreshAll(); if (!document.getElementById("projectDashboardSection").classList.contains("hidden")) { const proj = projectsStore.find(p => p.id === projectId); if(proj) showPersonalProjectDashboard(projectId, proj.name); } };
  
  loadFromLocalStorage();
  refreshAll();
</script>
</body>
</html>
